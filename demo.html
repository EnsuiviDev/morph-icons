<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morphing Icons Lab</title>
    <script src="morph-icons.js"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --accent: #6366f1;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }
        h1 { margin-bottom: 0.5rem; }
        p { color: #64748b; margin-bottom: 2rem; }

        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            max-width: 1000px;
            width: 100%;
        }

        /* Controls Styling */
        .controls {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            height: fit-content;
        }
        .control-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }
        input[type="text"], input[type="range"], select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* Preview Styling */
        .preview-area {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            min-height: 400px;
        }

        /* Customizing the component instance via CSS Variables */
        #demo-icon {
            --base-color: #94a3b8;
            --hover-color: #6366f1;
            /* --fill-color: #f43f5e;  <-- Uncomment to override auto-calculation */
            --hover-duration: 0.4s;
        }

        .gallery {
            margin-top: 3rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .gallery-item {
            text-align: center;
        }
        .gallery-item code { font-size: 0.7rem; color: #94a3b8; }
    </style>
</head>
<body>

    <h1>Morphing Icons Lab</h1>
    <p>Hover over the icons to see the duotone morphing effect.</p>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label>Icon Name (Material Symbol)</label>
                <input type="text" id="input-name" value="bolt" placeholder="e.g. favorite, settings...">
            </div>
            <div class="control-group">
                <label>Shape</label>
                <select id="input-shape">
                    <option value="rounded" selected>Rounded</option>
                    <option value="sharp">Sharp</option>
                </select>
            </div>
            <div class="control-group">
                <label>Size (<span id="size-val">120px</span>)</label>
                <input type="range" id="input-size" min="48" max="250" value="120">
            </div>
            <div class="control-group">
                <label>Hover Color</label>
                <input type="color" id="input-color" value="#6366f1">
            </div>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 1.5rem 0;">
            <p style="font-size: 0.8rem italic;">The "Fill Color" is being auto-calculated based on your Hover Color brightness!</p>
        </div>

        <div class="preview-area">
            <morph-icon id="demo-icon" name="bolt" size="120px"></morph-icon>
            <div style="margin-top: 2rem; font-family: monospace; background: #f1f5f9; padding: 1rem; border-radius: 8px; width: 100%;">
                &lt;morph-icon name="<span id="code-name">bolt</span>" shape="<span id="code-shape">rounded</span>" size="<span id="code-size">120px</span>"&gt;&lt;/morph-icon&gt;
            </div>
        </div>
    </div>

    <div class="gallery">
        <div class="gallery-item">
            <morph-icon name="favorite" size="64px" style="--hover-color: #ec4899;"></morph-icon>
            <br><code>favorite</code>
        </div>
        <div class="gallery-item">
            <morph-icon name="star" size="64px" style="--hover-color: #eab308;"></morph-icon>
            <br><code>star</code>
        </div>
        <div class="gallery-item">
            <morph-icon name="verified" size="64px" style="--hover-color: #0ea5e9;"></morph-icon>
            <br><code>verified</code>
        </div>
        <div class="gallery-item">
            <morph-icon name="auto_awesome" size="64px" style="--hover-color: #a855f7;"></morph-icon>
            <br><code>auto_awesome</code>
        </div>
    </div>

    <script>
        const icon = document.getElementById('demo-icon');
        const inputName = document.getElementById('input-name');
        const inputShape = document.getElementById('input-shape');
        const inputSize = document.getElementById('input-size');
        const inputColor = document.getElementById('input-color');

        const codeName = document.getElementById('code-name');
        const codeShape = document.getElementById('code-shape');
        const codeSize = document.getElementById('code-size');
        const sizeVal = document.getElementById('size-val');

        // Update Name
        inputName.addEventListener('input', (e) => {
            const val = e.target.value || 'question_mark';
            icon.setAttribute('name', val);
            codeName.textContent = val;
        });

        // Update Shape
        inputShape.addEventListener('change', (e) => {
            icon.setAttribute('shape', e.target.value);
            codeShape.textContent = e.target.value;
        });

        // Update Size
        inputSize.addEventListener('input', (e) => {
            const val = e.target.value + 'px';
            icon.setAttribute('size', val);
            codeSize.textContent = val;
            sizeVal.textContent = val;
        });

        // Update Hover Color (CSS Variable)
        inputColor.addEventListener('input', (e) => {
            // Note: We clear --fill-color so the component re-calculates it 
            // based on the new hover color brightness logic in your script.
            icon.style.setProperty('--fill-color', 'unset');
            icon.style.setProperty('--hover-color', e.target.value);
            
            // Trigger an attribute change to force the component's internal updateIcon()
            icon.setAttribute('name', icon.getAttribute('name'));
        });
    </script>
</body>
</html>
