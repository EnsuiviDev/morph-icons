<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MorphIcon Interactive Demo</title>
    <script type="text/javascript" src="morph-icons.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            margin: 0;
            padding: 2rem;
            color: #333;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.2rem;
            color: #1a1a1a;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
        }

        .controls,
        .preview,
        .code-snippet {
            background: #fff;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            max-width: 350px;
            flex: 1;
            min-width: 280px;
        }

        .controls label {
            display: block;
            margin: 0.5rem 0 0.2rem;
            font-weight: 600;
            color: #555;
        }

        .controls input,
        .controls select {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        morph-icon {
            --hover-color: #ff4c60;
            --base-color: #222;
            --size: 96px;
            display: inline-block;
            margin: 1rem auto;
            transition: transform 0.3s ease;
        }

        morph-icon:hover {
            transform: scale(1.2);
        }

        .code-snippet pre {
            background: #f3f3f3;
            padding: 1rem;
            border-radius: 12px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4c60;
            color: #fff;
            border: none;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s ease;
        }

        .copy-btn:hover {
            background: #e03e50;
        }

        .preview {
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>MorphIcon Interactive Demo</h1>

    <div class="container">
        <!-- Controls Panel -->
        <div class="controls">
            <label for="icon-name">Icon Name</label>
            <input type="text" id="icon-name" value="home">

            <label for="icon-shape">Shape</label>
            <select id="icon-shape">
                <option value="rounded" selected>Rounded</option>
                <option value="sharp">Sharp</option>
            </select>

            <label for="icon-size">Size (px)</label>
            <input type="number" id="icon-size" value="96" min="24" max="256">

            <label for="base-color">Base Color</label>
            <input type="color" id="base-color" value="#222222">

            <label for="hover-color">Hover Color</label>
            <input type="color" id="hover-color" value="#ff4c60">
        </div>

        <!-- Preview Panel -->
        <div class="preview">
            <morph-icon id="my-icon" name="home"></morph-icon>
        </div>

        <!-- Code Snippet Panel -->
        <div class="code-snippet">
            <pre id="code-block">&lt;morph-icon name="home" shape="rounded" size="96px"&gt;&lt;/morph-icon&gt;</pre>
            <button class="copy-btn" id="copy-btn">Copy</button>
        </div>
    </div>

    <script>
        const icon = document.getElementById('my-icon');
        const nameInput = document.getElementById('icon-name');
        const shapeSelect = document.getElementById('icon-shape');
        const sizeInput = document.getElementById('icon-size');
        const baseColorInput = document.getElementById('base-color');
        const hoverColorInput = document.getElementById('hover-color');
        const codeBlock = document.getElementById('code-block');
        const copyBtn = document.getElementById('copy-btn');

        function updateIcon() {
            icon.setAttribute('name', nameInput.value);
            icon.setAttribute('shape', shapeSelect.value);
            icon.setAttribute('size', sizeInput.value + 'px');
            icon.style.setProperty('--base-color', baseColorInput.value);
            icon.style.setProperty('--hover-color', hoverColorInput.value);
            icon.style.setProperty('--fill-color', 'unset'); // recalc duotone
            icon.updateIcon();

            // Update HTML snippet
            codeBlock.textContent = `<morph-icon name="${nameInput.value}" shape="${shapeSelect.value}" size="${sizeInput.value}px"></morph-icon>`;
        }

        [nameInput, shapeSelect, sizeInput, baseColorInput, hoverColorInput].forEach(el => {
            el.addEventListener('input', updateIcon);
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(codeBlock.textContent).then(() => {
                copyBtn.textContent = 'Copied!';
                setTimeout(() => copyBtn.textContent = 'Copy', 1500);
            });
        });
    </script>

</body>

</html>
