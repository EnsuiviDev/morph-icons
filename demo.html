<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morph Icons Demo | EnsuiviDev</title>
    <script src="morph-icons.js"></script>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent-primary: #38bdf8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; margin-bottom: 3rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.1);
        }

        .label {
            margin-top: 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #64748b;
        }

        /* Preset Styles */
        .blue-theme { --hover-color: #38bdf8; --base-color: #475569; }
        .rose-theme { --hover-color: #fb7185; --base-color: #475569; }
        .amber-theme { --hover-color: #fbbf24; --base-color: #475569; }
        .emerald-theme { --hover-color: #34d399; --base-color: #475569; }

        /* Shopify Style Section */
        .shopify-preview {
            margin-top: 5rem;
            background: #ffffff;
            color: #202223;
            padding: 3rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 1000px;
            text-align: center;
        }

        .shopify-preview h2 { margin-bottom: 2rem; }

        .shopify-icons {
            display: flex;
            justify-content: space-around;
            --base-color: #5c5f62;
            --hover-color: #008060; /* Shopify Green */
        }
    </style>
</head>
<body>

    <h1>morph-icons</h1>
    <p>Hover over the icons to see the dynamic duotone morphing effect.</p>

    <div class="grid">
        <div class="card blue-theme">
            <morph-icon name="rocket_launch" size="80px"></morph-icon>
            <div class="label">Rocket (Rounded)</div>
        </div>

        <div class="card rose-theme">
            <morph-icon name="favorite" shape="sharp" size="80px"></morph-icon>
            <div class="label">Heart (Sharp)</div>
        </div>

        <div class="card amber-theme">
            <morph-icon name="bolt" style="--hover-duration: 0.6s" size="80px"></morph-icon>
            <div class="label">Slow Morph</div>
        </div>

        <div class="card emerald-theme">
            <morph-icon name="verified" size="80px"></morph-icon>
            <div class="label">Verified</div>
        </div>
    </div>

    <div class="shopify-preview">
        <h2>Shopify Theme Implementation</h2>
        <div class="shopify-icons">
            <div>
                <morph-icon name="shopping_cart" size="48px"></morph-icon>
                <div class="label">Cart</div>
            </div>
            <div>
                <morph-icon name="search" size="48px"></morph-icon>
                <div class="label">Search</div>
            </div>
            <div>
                <morph-icon name="account_circle" size="48px"></morph-icon>
                <div class="label">Account</div>
            </div>
        </div>
    </div>

    <footer style="margin-top: 4rem; opacity: 0.5; font-size: 0.8rem;">
        Developed by EnsuiviDev &copy; 2026
    </footer>

</body>
</html>
